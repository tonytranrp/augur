name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # GitHub's own default is 6 hours -- far too long a leash for a genuine
    # hang to run on before anyone notices. 25 minutes is generous headroom
    # over the slowest legitimate run observed so far (a macOS Debug build
    # that was still visibly making real progress, just erratically paced
    # on a contended runner, when manually cancelled around the 20-minute
    # mark -- its own Release sibling finished in 7.5 minutes).
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: both GCC and Clang, both configs. macOS ships only
          # Clang (Apple's own "gcc" is a Clang wrapper, not a real GCC --
          # a genuine GCC install via Homebrew is slow and non-standard
          # for CI, so it's deliberately not in this matrix). Windows:
          # MSVC as the default toolchain, plus Clang via the ClangCL
          # toolset (LLVM ships preinstalled on GitHub's windows-latest
          # image as part of the Visual Studio Desktop C++ workload).
          - name: ubuntu-gcc-debug
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Debug
          - name: ubuntu-gcc-release
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Release
          - name: ubuntu-clang-debug
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Debug
          - name: ubuntu-clang-release
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Release
          - name: macos-clang-debug
            os: macos-latest
            cc: clang
            cxx: clang++
            build_type: Debug
          - name: macos-clang-release
            os: macos-latest
            cc: clang
            cxx: clang++
            build_type: Release
          - name: windows-msvc-debug
            os: windows-latest
            build_type: Debug
          - name: windows-msvc-release
            os: windows-latest
            build_type: Release
          - name: windows-clangcl-debug
            os: windows-latest
            build_type: Debug
            toolset: ClangCL
          - name: windows-clangcl-release
            os: windows-latest
            build_type: Release
            toolset: ClangCL
    steps:
      - uses: actions/checkout@v4

      # Warnings-as-errors, added only after Phase 1 (docs/PRODUCTION_ROADMAP.md
      # P0 items 3-4) confirmed include/augur/ itself is 0 warnings under
      # -Wall -Wextra -Wpedantic. -Wno-c2y-extensions is a narrow, deliberate
      # exemption: Catch2's own TEST_CASE macro uses __COUNTER__, which this
      # environment's clang flags at every macro-expansion site (135
      # occurrences, all inside tests/unit/*.cpp, none in include/augur/ --
      # see that P0 item's write-up) -- exempting just that diagnostic keeps
      # -Werror meaningful (a real new warning anywhere still fails the
      # build) without the build failing on a third-party dependency's own
      # internals that this repo has no way to fix.
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror -Wno-c2y-extensions"

      - name: Configure (Windows, MSVC)
        if: runner.os == 'Windows' && matrix.toolset == ''
        run: >
          cmake -B build
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="/W4 /WX"

      - name: Configure (Windows, ClangCL)
        if: runner.os == 'Windows' && matrix.toolset != ''
        run: >
          cmake -B build -T ${{ matrix.toolset }}
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="/W4 /WX"

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  android-ndk:
    name: android-ndk-arm64-v8a
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Confirms docs/GETTING_STARTED.md's own documented invocation
      # actually cross-compiles, not just that it reads plausibly.
      # AUGUR_BUILD_TESTS is deliberately left OFF: an x86_64 CI runner
      # can't execute arm64-v8a binaries, so a cross-compiled test binary
      # would just be dead weight. AUGUR_BUILD_EXAMPLES=ON is real signal
      # though -- it confirms application-style code that pulls in
      # multiple augur headers together (not just the interface stub)
      # actually cross-compiles clean. ANDROID_NDK_LATEST_HOME is
      # GitHub's own documented env var for the NDK preinstalled on
      # ubuntu-latest runners -- no separate NDK download/install step
      # needed.
      - name: Configure
        run: >
          cmake -B build-android
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-24
          -DAUGUR_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build-android --parallel
