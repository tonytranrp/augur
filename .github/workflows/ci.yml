name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # GitHub's own default is 6 hours -- far too long a leash for a genuine
    # hang to run on before anyone notices. 25 minutes is generous headroom
    # over the slowest legitimate run observed so far (a macOS Debug build
    # that was still visibly making real progress, just erratically paced
    # on a contended runner, when manually cancelled around the 20-minute
    # mark -- its own Release sibling finished in 7.5 minutes).
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: both GCC and Clang, both configs. macOS ships only
          # Clang (Apple's own "gcc" is a Clang wrapper, not a real GCC --
          # a genuine GCC install via Homebrew is slow and non-standard
          # for CI, so it's deliberately not in this matrix). Windows:
          # MSVC as the default toolchain, plus Clang via the ClangCL
          # toolset (LLVM ships preinstalled on GitHub's windows-latest
          # image as part of the Visual Studio Desktop C++ workload).
          - name: ubuntu-gcc-debug
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Debug
          - name: ubuntu-gcc-release
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            build_type: Release
          - name: ubuntu-clang-debug
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Debug
          - name: ubuntu-clang-release
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            build_type: Release
          - name: macos-clang-debug
            os: macos-latest
            cc: clang
            cxx: clang++
            build_type: Debug
          - name: macos-clang-release
            os: macos-latest
            cc: clang
            cxx: clang++
            build_type: Release
          - name: windows-msvc-debug
            os: windows-latest
            build_type: Debug
          - name: windows-msvc-release
            os: windows-latest
            build_type: Release
          - name: windows-clangcl-debug
            os: windows-latest
            build_type: Debug
            toolset: ClangCL
          - name: windows-clangcl-release
            os: windows-latest
            build_type: Release
            toolset: ClangCL
    steps:
      - uses: actions/checkout@v4

      # Warnings-as-errors, added only after Phase 1 (docs/PRODUCTION_ROADMAP.md
      # P0 items 3-4) confirmed include/augur/ itself is 0 warnings under
      # -Wall -Wextra -Wpedantic. AUGUR_WARNINGS_AS_ERRORS applies strict
      # flags via target_compile_options() to augur's own example/test
      # targets ONLY (see CMakeLists.txt's augur_apply_strict_warnings) --
      # deliberately NOT a global CMAKE_CXX_FLAGS override, which would
      # also hold CPM-fetched dependencies (Catch2, glm, boost_pfr) to a
      # bar their own vendored source has no obligation to meet, and would
      # silently replace CMake's own per-compiler defaults (e.g. MSVC's
      # /EHsc) instead of adding to them -- both of which broke the first,
      # global-override version of this change in practice.
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DAUGUR_WARNINGS_AS_ERRORS=ON

      - name: Configure (Windows, MSVC)
        if: runner.os == 'Windows' && matrix.toolset == ''
        run: >
          cmake -B build
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DAUGUR_WARNINGS_AS_ERRORS=ON

      - name: Configure (Windows, ClangCL)
        if: runner.os == 'Windows' && matrix.toolset != ''
        run: >
          cmake -B build -T ${{ matrix.toolset }}
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON
          -DAUGUR_WARNINGS_AS_ERRORS=ON

      # Explicit job count rather than bare --parallel (which spawns as
      # many concurrent compiles as the runner reports cores). Observed
      # directly, twice: macos-clang-debug intermittently spent 20-25+
      # minutes on a build every OTHER job finished well under half that
      # (its own Release sibling ranged 7.4-19.5 minutes across the two
      # incidents -- the second one suggests broader runner contention
      # that time, not purely this job oversubscribing itself), and the
      # cancelled run's cleanup log showed dozens of still-live orphaned
      # clang processes at once -- consistent with oversubscribing a
      # runner whose reported core count exceeds what it can actually
      # sustain concurrently, not a
      # hang. 3 is conservative for GitHub's smallest standard runner
      # tier (historically macOS); Linux/Windows have headroom to spare.
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel 3

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config ${{ matrix.build_type }} --parallel 3

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  android-ndk:
    name: android-ndk-arm64-v8a
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Confirms docs/GETTING_STARTED.md's own documented invocation
      # actually cross-compiles, not just that it reads plausibly.
      # AUGUR_BUILD_TESTS is deliberately left OFF: an x86_64 CI runner
      # can't execute arm64-v8a binaries, so a cross-compiled test binary
      # would just be dead weight. AUGUR_BUILD_EXAMPLES=ON is real signal
      # though -- it confirms application-style code that pulls in
      # multiple augur headers together (not just the interface stub)
      # actually cross-compiles clean. ANDROID_NDK_LATEST_HOME is
      # GitHub's own documented env var for the NDK preinstalled on
      # ubuntu-latest runners -- no separate NDK download/install step
      # needed.
      - name: Configure
        run: >
          cmake -B build-android
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-24
          -DAUGUR_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build-android --parallel

  sanitizers:
    name: asan-ubsan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Turns docs/PRODUCTION_ROADMAP.md P0 item 4's one-off manual
      # ASan/UBSan repro (a standalone file, never checked into the repo,
      # verifying just joint_probabilistic_data_association() at full
      # capacity) into something that runs on every push against the
      # WHOLE test suite. Deliberately a GLOBAL CMAKE_CXX_FLAGS/
      # CMAKE_EXE_LINKER_FLAGS override here, unlike the warnings-as-
      # errors job -- ASan/UBSan want the entire linked binary
      # instrumented for reliable coverage (including Catch2's own
      # compiled library), not scoped to augur's own targets the way
      # -Werror deliberately is (see CMakeLists.txt's
      # augur_apply_strict_warnings comment for why that one differs).
      # AUGUR_BUILD_EXAMPLES is left off: ctest is what this job checks,
      # examples aren't part of it, and skipping them keeps this job
      # focused and fast.
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build --parallel 3

      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      # CMAKE_EXPORT_COMPILE_COMMANDS gives clang-tidy a real
      # compile_commands.json to work from -- necessary for a header-only
      # template-heavy library, where a header on its own has nothing to
      # analyze until it's actually instantiated by a real translation
      # unit (an example or a test .cpp).
      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DAUGUR_BUILD_TESTS=ON
          -DAUGUR_BUILD_EXAMPLES=ON

      # Non-blocking for now, per docs/PRODUCTION_ROADMAP.md Phase 2's own
      # wording: this is a first pass to start surfacing findings, not a
      # merge gate -- this repo hasn't had a chance to triage a clang-tidy
      # checklist yet. continue-on-error keeps the step's own exit code
      # (a real "N warnings found" signal, visible in the Actions UI)
      # rather than silently swallowing it, while not failing the
      # overall workflow.
      - name: Run clang-tidy
        continue-on-error: true
        run: |
          find examples tests -name '*.cpp' | xargs -P "$(nproc)" -I{} clang-tidy -p build {}
